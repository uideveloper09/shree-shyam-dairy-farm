apiVersion: v1
kind: Secret
metadata:
  name: ssd-app-secrets
  namespace: shree-shyam
type: Opaque
stringData:
  # Replace via sealed-secrets / external-secrets / CI — never commit real values
  DATABASE_URL: "postgresql://user:pass@host:5432/shree_shyam?sslmode=require"
  JWT_ACCESS_SECRET: "CHANGE_ME_MIN_32_CHARS"
  JWT_REFRESH_SECRET: "CHANGE_ME_MIN_32_CHARS"
  RAZORPAY_KEY_SECRET: "CHANGE_ME"
  NEXT_PUBLIC_RAZORPAY_KEY_ID: "rzp_test_xxxxx"
  REDIS_URL: "redis://redis:6379"
  SENTRY_DSN: ""
  METRICS_TOKEN: "CHANGE_ME"
  ADMIN_SECRET: "CHANGE_ME"
