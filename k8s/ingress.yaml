apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ssd-app
  namespace: shree-shyam
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
    - hosts:
        - shree-shyam-dairy-farm.vercel.app
        - erp.shreeshyamdairyfarm.com
      secretName: ssd-tls
  rules:
    - host: erp.shreeshyamdairyfarm.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ssd-app
                port:
                  number: 80
