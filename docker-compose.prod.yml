# Production stack — app + nginx + redis + workers
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: shree-shyam-dairy-farm:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - web
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1"
          memory: 1G

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - web

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - web

  worker-queue:
    build:
      context: .
      target: deps
    command: npx tsx workers/queue.worker.ts
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  redis_data:
