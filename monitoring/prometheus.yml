global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ssd-app
    metrics_path: /api/metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]
    bearer_token: dev-metrics-token

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
